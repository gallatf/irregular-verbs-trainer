name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write prod config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          EMAIL_CONFIRMATION_REQUIRED: ${{ vars.EMAIL_CONFIRMATION_REQUIRED }}
        run: |
          cat > app/supabase_config.prod.js << EOF
          export const SUPABASE_URL = '${SUPABASE_URL}';
          export const SUPABASE_ANON_KEY = '${SUPABASE_ANON_KEY}';
          export const EMAIL_CONFIRMATION_REQUIRED = ${EMAIL_CONFIRMATION_REQUIRED};
          EOF

      - name: Package prod
        run: npm run package:prod

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/prod

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
